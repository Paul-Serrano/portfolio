name: portfolio-dev

services:
  app:
    build:
      context: ../../..
      dockerfile: infra/docker/dev/php/Dockerfile
    working_dir: /var/www/html
    env_file:
      - .env.dev
    command: >
      sh -lc "if [ -f composer.json ] && [ ! -d vendor ]; then composer install --no-interaction --prefer-dist; fi && if [ -d storage ] && [ -d bootstrap/cache ]; then chown -R www-data:www-data storage bootstrap/cache && chmod -R ug+rwx storage bootstrap/cache; fi && php-fpm"
    volumes:
      - ../../../backend:/var/www/html
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    extra_hosts:
      - host.docker.internal:host-gateway
    networks:
      - portfolio

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - app
    ports:
      - "8080:80"
    volumes:
      - ../../../backend:/var/www/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - portfolio

  db:
    image: postgres:17-alpine
    env_file:
      - .env.dev
    ports:
      - "5432:5432"
    volumes:
      - dev_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - portfolio

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - portfolio

networks:
  portfolio:
    driver: bridge

volumes:
  dev_postgres_data: