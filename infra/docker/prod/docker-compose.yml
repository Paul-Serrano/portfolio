name: portfolio-prod

services:
  app:
    build:
      context: ../../..
      dockerfile: infra/docker/prod/php/Dockerfile
    env_file:
      - .env.prod
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - prod_storage:/var/www/html/storage
      - prod_cache:/var/www/html/bootstrap/cache
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - portfolio

  nginx:
    build:
      context: ../../..
      dockerfile: infra/docker/prod/nginx/Dockerfile
    depends_on:
      - app
    ports:
      - "80:80"
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    networks:
      - portfolio

  db:
    image: postgres:17-alpine
    env_file:
      - .env.prod
    volumes:
      - prod_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - portfolio

  redis:
    image: redis:7-alpine
    networks:
      - portfolio

networks:
  portfolio:
    driver: bridge

volumes:
  prod_postgres_data:
  prod_storage:
  prod_cache: