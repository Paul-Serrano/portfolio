services:
  - type: web
    name: portfolio-web
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile.render
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: APP_NAME
        value: Paul Serrano Portfolio
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        value: https://portfolio-web.onrender.com
      - key: APP_KEY
        generateValue: true
      - key: LOG_CHANNEL
        value: stderr
      - key: DB_CONNECTION
        value: sqlite
      - key: DB_DATABASE
        value: /var/www/html/database/database.sqlite
      - key: CACHE_STORE
        value: file
      - key: SESSION_DRIVER
        value: file
      - key: QUEUE_CONNECTION
        value: sync